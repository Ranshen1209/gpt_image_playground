<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#9181bd" />
    <meta name="description" content="Sakrylle 图像工坊 — gpt-image-2 在线生成与编辑" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sakrylle" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function () {
        try {
          var THEME_KEY = 'sakrylle-image-playground.theme';
          var LANG_KEY = 'sakrylle-image-playground.language';
          var raw = null;
          try { raw = localStorage.getItem(THEME_KEY); } catch (_) {}
          var prefersDark = false;
          try { prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; } catch (_) {}
          var dark = raw === 'dark' || (raw !== 'light' && prefersDark);
          if (dark) document.documentElement.classList.add('dark');

          var lang = null;
          try { lang = localStorage.getItem(LANG_KEY); } catch (_) {}
          if (lang !== 'zh' && lang !== 'en') {
            var navLangs = (navigator.languages || [navigator.language || '']).map(function (l) {
              return (l || '').toLowerCase();
            });
            var hasZh = navLangs.some(function (l) { return l.indexOf('zh') === 0; });
            var hasEn = navLangs.some(function (l) { return l.indexOf('en') === 0; });
            lang = hasZh ? 'zh' : (hasEn ? 'en' : 'en');
          }
          document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
        } catch (e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fontsapi.zeoseven.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lobehub/webfont-harmony-sans-sc@1.0.0/css/index.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/442/main/result.css" />
    <title>Sakrylle 图像工坊</title>
  </head>
  <body class="bg-[#f7f4fb] text-gray-900 dark:bg-[#0e0c14] dark:text-gray-100 min-h-screen sakrylle-ambient">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
